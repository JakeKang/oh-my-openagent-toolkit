        - **Resource Provisioning**: [Automated resource creation]
        - **Version Control**: [Infrastructure version control and changes]
        - **Documentation**: [Infrastructure documentation and runbooks]

    infrastructure-state.md:
      purpose: "System monitoring and performance tracking for production systems"
      update_triggers: ["infrastructure_monitoring", "performance_updates", "scaling_events"]
      template_content: |
        # Infrastructure State & System Monitoring

        ## System Health
        - **Server Status**: [System uptime and availability metrics]
        - **Resource Utilization**: [CPU, memory, disk usage monitoring]
        - **Network Performance**: [Network latency and throughput]
        - **Service Status**: [Application service health and status]

        ## Performance Monitoring
        - **Application Performance**: [Response times and throughput]
        - **Database Performance**: [Query performance and connection status]
        - **Cache Performance**: [Cache hit rates and optimization]
