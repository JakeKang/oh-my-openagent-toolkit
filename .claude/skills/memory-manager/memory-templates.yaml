version: "1.0"
name: "Domain-Specific Memory Template System"
description: "Project type specific memory structures for effective context management throughout project lifecycle"
powered_by: "Hans(HanTaek) Lim - Development AI Agent Team Memory Pattern"

# Development AI Agent Team Memory System
# Provides specialized memory structures for each project type
memory_templates:
  
  # Web Application Memory Structure
  web-app:
    name: "Web Application Memory Structure"
    description: "Frontend, Backend, Database integration focused memory management"
    core_files:
      active-context.md:
        purpose: "Current web application development status, active tasks, and immediate context"
        update_triggers: ["task_start", "task_completion", "feature_addition", "integration_milestone"]
        access_pattern: "read_on_start, update_on_change"
        template_content: |
          # Web Application Development Context
          
          ## Project Overview
          - **Project Type**: Web Application
          - **Current Phase**: [requirements/architecture/implementation/testing/deployment]
          - **Active Tasks**: [current development tasks]
          - **Next Milestones**: [upcoming deliverables]
          
          ## Technical Stack
          - **Frontend**: [Next.js/React/Vue/etc]
          - **Backend**: [Nest.js/Express/FastAPI/etc]
          - **Database**: [PostgreSQL/MongoDB/etc]
          - **Deployment**: [Vercel/Railway/Docker/etc]
          
          ## Current Focus Areas
          - **UI/UX Development**: [current component work]
          - **API Development**: [current endpoint work]
          - **Integration Status**: [frontend-backend connection status]
          - **Performance Targets**: [current optimization goals]
      
      ui-components.md:
        purpose: "UI component architecture, design system, and component specifications"
        update_triggers: ["component_design", "ui_refinement", "design_system_update"]
        access_pattern: "read_before_frontend_work, update_during_design"
        template_content: |
          # UI Components & Design System
          
          ## Component Architecture
          - **Design System**: [component library approach]
          - **Styling Strategy**: [Tailwind/CSS Modules/Styled Components/etc]
          - **Component Patterns**: [atomic design/feature-based/etc]
          
          ## Core Components
          ### Layout Components
          - Header/Navigation: [specifications]
          - Footer: [specifications]
          - Sidebar: [specifications]
          
          ### UI Components  
          - Buttons: [variants and specifications]
          - Forms: [input types and validation]
          - Cards: [content display patterns]
          - Modals: [interaction patterns]
          
          ## Responsive Design
          - **Breakpoints**: [mobile/tablet/desktop specifications]
          - **Grid System**: [layout structure]
          - **Typography Scale**: [font size and hierarchy]
          
          ## Accessibility Requirements
          - **WCAG Compliance**: [target level]
          - **Screen Reader Support**: [implementation status]
          - **Keyboard Navigation**: [focus management]
      
      api-endpoints.md:
        purpose: "API specification, endpoint documentation, and backend integration details"
        update_triggers: ["api_design", "endpoint_implementation", "integration_testing"]
        access_pattern: "read_before_backend_work, update_during_api_development"
        template_content: |
          # API Endpoints & Backend Integration
          
          ## API Architecture
          - **API Style**: [REST/GraphQL/tRPC/etc]
          - **Authentication**: [JWT/OAuth/Session/etc]
          - **Data Format**: [JSON/XML/etc]
          - **Error Handling**: [error response patterns]
          
          ## Endpoint Specifications
          ### Authentication Endpoints
          - POST /api/auth/login: [user login]
          - POST /api/auth/register: [user registration]
          - POST /api/auth/logout: [user logout]
          - GET /api/auth/profile: [user profile]
          
          ### Core Business Endpoints
          [Domain-specific endpoints based on project requirements]
          
          ## Database Schema
          - **User Model**: [field specifications]
          - **Core Entity Models**: [business domain models]
          - **Relationships**: [entity relationships]
          
          ## Integration Details
          - **Frontend-Backend Communication**: [data flow patterns]
          - **Real-time Features**: [WebSocket/SSE implementation]
          - **File Upload**: [media handling strategy]
      
      user-flows.md:
        purpose: "User journey mapping, interaction flows, and UX specifications"
        update_triggers: ["ux_design", "flow_optimization", "user_testing"]
        access_pattern: "read_before_ux_work, update_during_design"
        template_content: |
          # User Flows & Experience Design
          
          ## Primary User Journeys
          ### User Registration & Onboarding
          1. Landing page visit
          2. Registration form completion
          3. Email verification
          4. Profile setup
          5. Dashboard introduction
          
          ### Core Feature Usage
          [Domain-specific user flows]
          
          ## Interaction Patterns
          - **Navigation Patterns**: [menu structure and flow]
          - **Form Interactions**: [validation and feedback]
          - **Data Visualization**: [charts/tables/dashboards]
          - **Search & Filtering**: [data discovery patterns]
          
          ## UX Requirements
          - **Performance Expectations**: [page load times]
          - **Accessibility Standards**: [inclusive design requirements]
          - **Mobile Experience**: [responsive behavior]
          - **Error States**: [error handling UX]
      
      performance-targets.md:
        purpose: "Performance metrics, optimization goals, and monitoring specifications"
        update_triggers: ["performance_testing", "optimization_work", "metric_updates"]
        access_pattern: "read_during_optimization, update_after_testing"
        template_content: |
          # Performance Targets & Optimization
          
          ## Core Web Vitals Targets
          - **Largest Contentful Paint (LCP)**: < 2.5s
          - **First Input Delay (FID)**: < 100ms
          - **Cumulative Layout Shift (CLS)**: < 0.1
          
          ## Application Performance
          - **Initial Page Load**: < 3s
          - **Route Transitions**: < 500ms
          - **API Response Times**: < 200ms
          - **Bundle Size**: < 250KB (gzipped)
          
          ## Optimization Strategies
          - **Code Splitting**: [lazy loading implementation]
          - **Image Optimization**: [format and compression strategy]
          - **Caching Strategy**: [browser and server caching]
          - **CDN Usage**: [static asset delivery]
          
          ## Monitoring & Analytics
          - **Performance Monitoring**: [tools and dashboards]
          - **User Analytics**: [behavior tracking]
          - **Error Tracking**: [error monitoring setup]
    
    workflow_integration:
      initialization: "Create web-app memory structure when web application project detected"
      expert_access: ["frontend", "backend", "fullstack", "qa", "devops"]
      collaboration_triggers: ["ui_design_decisions", "api_contract_changes", "performance_optimization"]

