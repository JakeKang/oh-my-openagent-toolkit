# Memory System Management Rules
memory_management:
  automatic_initialization: true  # Automatic memory structure creation upon project detection
  template_selection_logic: "project_detection_result"  # Based on project-detection.yaml results
  hybrid_project_handling: "multiple_templates"  # Multiple template combination for hybrid projects
  
  update_protocols:
    frequent_updates: ["active-context.md"]  # Frequently updated files
    milestone_updates: ["architecture files", "specification files"]  # Updated at milestones
    completion_updates: ["performance files", "metrics files"]  # Updated upon completion
  
  collaboration_integration:
    shared_access: true  # All experts can access relevant memory files
    update_notifications: true  # Notify relevant experts when memory files are updated
    version_tracking: true  # Track memory file change history

# Expert-Specific Memory Templates (Common across all project types)
expert_memory_templates:

  # QA Expert Memory Files
  qa_expert_files:
    test-coverage.md:
      purpose: "Comprehensive testing documentation and coverage metrics tracking"
      update_triggers: ["test_implementation", "coverage_analysis", "quality_validation"]
      template_content: |
        # Test Coverage & Quality Metrics

        ## Test Coverage Overview
        - **Unit Test Coverage**: [Current percentage and targets]
        - **Integration Test Coverage**: [API and service integration testing]
        - **E2E Test Coverage**: [End-to-end user flow coverage]
        - **Component Test Coverage**: [Frontend component testing status]

        ## Testing Strategy
        - **Testing Framework**: [Playwright MCP for E2E, Jest/Vitest for unit tests]
        - **Test Automation**: [CI/CD integration and automated testing pipelines]
        - **Quality Gates**: [Minimum coverage requirements and quality standards]
        - **Test Maintenance**: [Test suite maintenance and updates]

        ## Current Test Metrics
        - **Total Tests**: [Number of tests implemented]
        - **Passing Tests**: [Success rate and stability metrics]
        - **Test Execution Time**: [Performance of test suite]
        - **Coverage Gaps**: [Areas requiring additional testing]

    quality-metrics.md:
      purpose: "Performance metrics, accessibility compliance, and quality tracking"
      update_triggers: ["performance_testing", "accessibility_validation", "quality_assessment"]
      template_content: |
        # Quality Metrics & Standards Tracking

        ## Performance Metrics
        - **Core Web Vitals**: LCP, FID, CLS measurements and targets
        - **Load Testing Results**: Response times and throughput metrics
        - **Resource Usage**: Memory, CPU, and network utilization
        - **Performance Trends**: Historical performance data and improvements

        ## Accessibility Compliance
        - **WCAG 2.1 AA Compliance**: Current status and gap analysis
        - **Screen Reader Testing**: Compatibility and navigation testing
        - **Keyboard Navigation**: Focus management and accessibility features
        - **Color Contrast**: Visual accessibility and inclusive design

        ## Code Quality Metrics
        - **Code Coverage**: Test coverage percentages and quality gates
        - **Static Analysis**: Code quality scores and improvement recommendations
        - **Security Scanning**: Vulnerability assessments and remediation status
        - **Best Practices**: Adherence to coding standards and conventions

    security-testing.md:
      purpose: "Security testing results and vulnerability assessment tracking"
      update_triggers: ["security_scanning", "vulnerability_assessment", "penetration_testing"]
      template_content: |
        # Security Testing & Vulnerability Management

        ## Security Assessment Status
        - **Vulnerability Scanning**: Automated security scan results
        - **Penetration Testing**: Manual security testing outcomes
        - **Authentication Testing**: Security validation for auth flows
        - **Authorization Testing**: Access control and permission validation

        ## Security Compliance
        - **Security Standards**: OWASP compliance and security best practices
        - **Data Protection**: Privacy and data security implementation
        - **Encryption**: Data encryption at rest and in transit
        - **API Security**: Endpoint security and rate limiting

        ## Remediation Tracking
        - **Critical Issues**: High-priority security issues and fixes
        - **Remediation Progress**: Security improvement implementation status
        - **Security Monitoring**: Ongoing security monitoring and alerting
        - **Incident Response**: Security incident handling and response plans

    performance-validation.md:
      purpose: "Performance testing history and optimization tracking"
      update_triggers: ["performance_optimization", "load_testing", "monitoring_updates"]
      template_content: |
        # Performance Validation & Optimization

        ## Performance Testing Results
        - **Load Testing**: Concurrent user testing and capacity planning
        - **Stress Testing**: System limits and breaking point analysis
        - **Performance Benchmarks**: Baseline metrics and improvement targets
        - **Resource Monitoring**: System resource usage and optimization

        ## Optimization Tracking
        - **Performance Improvements**: Optimization changes and impact analysis
        - **Bottleneck Identification**: Performance bottlenecks and resolution
        - **Resource Optimization**: Memory, CPU, and network optimization
        - **Caching Strategy**: Cache implementation and effectiveness

        ## Monitoring & Alerting
        - **Performance Monitoring**: Real-time performance tracking setup
        - **Alert Configuration**: Performance threshold alerts and notifications
        - **Trend Analysis**: Performance trend analysis and predictive monitoring
        - **SLA Tracking**: Service level agreement monitoring and compliance

  # DevOps Expert Memory Files
