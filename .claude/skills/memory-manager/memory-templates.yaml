          2. **Data Cleaning**: [preprocessing steps]
          3. **Feature Engineering**: [transformation logic]
          4. **Data Validation**: [quality checks]
          5. **Data Storage**: [processed data storage]
          
          ## Feature Specifications
          - **Input Features**: [model input variables]
          - **Target Variables**: [prediction targets]
          - **Feature Selection**: [important features]
          - **Data Types**: [numerical/categorical/text/etc]
          
      training-requirements.md:
        purpose: "Training infrastructure and computational requirements"
        template_content: |
          # Training Requirements & Infrastructure
          
          ## Computational Requirements
          - **Hardware**: [GPU/CPU requirements]
          - **Memory**: [RAM and storage needs]
          - **Training Time**: [estimated duration]
          - **Distributed Training**: [multi-GPU setup]
          
          ## Training Pipeline
          - **Data Loading**: [batch processing strategy]
          - **Model Checkpointing**: [save/resume strategy]
          - **Monitoring**: [training metrics tracking]
          - **Early Stopping**: [convergence criteria]
          
          ## Experiment Tracking
          - **Version Control**: [model versioning]
          - **Hyperparameter Tuning**: [optimization strategy]
          - **Result Logging**: [experiment tracking tools]
          
      performance-metrics.md:
        purpose: "Model performance evaluation and monitoring metrics"
        template_content: |
          # Performance Metrics & Evaluation
          
          ## Evaluation Metrics
          - **Primary Metrics**: [main performance indicators]
          - **Secondary Metrics**: [additional evaluation criteria]
          - **Business Metrics**: [impact on business objectives]
          
          ## Model Validation
          - **Cross-Validation**: [validation strategy]
          - **Test Set Performance**: [final evaluation results]
          - **A/B Testing**: [production testing approach]
          
          ## Monitoring & Drift Detection
          - **Data Drift**: [input data change detection]
          - **Model Drift**: [performance degradation tracking]
          - **Retraining Triggers**: [model update criteria]
    
    workflow_integration:
      initialization: "Create ai-system memory structure when AI/ML project detected"
      expert_access: ["systemdev", "research", "backend", "qa"]
      collaboration_triggers: ["model_architecture_decisions", "data_pipeline_changes", "performance_optimization"]
    
    # CV/Image Analysis Extension (for ai_ml_system with computer vision focus)
    cv_analysis_files:
      cv-analysis-context.md:
        purpose: "CV/Image analysis pipeline status and results tracking"
        update_triggers: ["image_upload", "detection_complete", "graph_generation", "analysis_milestone"]
        access_pattern: "read_on_cv_task, update_during_analysis"
        template_content: |
          # CV Analysis Context
          
          ## Project Overview
          - **Analysis Type**: [Floor Plan / Blueprint / Medical / Satellite / etc]
          - **Current Phase**: [preprocessing/detection/segmentation/graph-construction/validation]
          - **Input Format**: [PNG/JPEG/TIFF/PDF]
          - **Output Requirements**: [JSON results, visualizations, spatial graph]
          
          ## Image Preprocessing Status
          - **Normalization**: [Applied / Pending]
          - **Noise Reduction**: [Applied / Not Required]
          - **Resolution**: [Original dimensions, processing resolution]
          - **Color Space**: [RGB / Grayscale / Binary]
          
          ## Detection Results
          ### Detected Elements
          - **Walls**: [count, confidence scores]
          - **Doors**: [count, types detected]
          - **Windows**: [count, positions]
          - **Rooms**: [count, labels assigned]
          - **Other Elements**: [stairs, furniture, fixtures]
          
          ### Detection Metrics
          - **Precision**: [current value vs target]
          - **Recall**: [current value vs target]
          - **IoU Threshold**: [configured value]
          - **Processing Time**: [per image]
          
          ## Spatial Graph Status
          - **Nodes**: [room count, element count]
          - **Edges**: [connectivity relationships]
          - **Graph Validity**: [validation status]
          - **Topology Accuracy**: [correctness of relationships]
          
          ## Analysis Pipeline Progress
          - [ ] Image upload and validation
          - [ ] Preprocessing complete
          - [ ] Element detection complete
          - [ ] Segmentation complete
          - [ ] Spatial graph constructed
          - [ ] Results validated
          - [ ] Output generated
          
          ## Known Issues / Refinements Needed
          - [List any detection issues, edge cases, or refinement requirements]

