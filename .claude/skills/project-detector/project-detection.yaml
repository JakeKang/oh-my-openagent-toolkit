version: "1.0"
name: "Project Type Auto-Detection System"
description: "Automatically detects project type and assigns appropriate expert teams based on user requests"
powered_by: "Hans(HanTaek) Lim - Development AI Agent Team Pattern"

# Automatic Project Type Detection Rules
project_types:
  web_application:
    name: "Web Application"
    triggers:
      keywords: ["web app", "website", "dashboard", "Next.js", "React", "frontend", "backend", "web service", "homepage", "portfolio", "Python backend", "async Python"]
      frameworks: ["nextjs", "react", "vue", "angular", "svelte", "nuxt", "fastapi", "nestjs"]
      technologies: ["html", "css", "javascript", "typescript", "tailwind", "python", "pydantic"]
    auto_experts: ["pm", "frontend", "backend", "fullstack", "qa", "devops", "mcp"]
    memory_template: "web-app"
    workflow_priority: ["requirements_analysis", "architecture_design", "frontend_implementation", "backend_implementation", "integration_orchestration", "deployment_pipeline", "quality_assurance"]
    
  ai_ml_system:
    name: "AI/ML System"
    triggers:
      keywords:
        - "AI"
        - "machine learning"
        - "deep learning"
        - "model development"
        - "data analysis"
        - "prediction model"
        - "natural language processing"
        - "computer vision"
        - "recommendation system"
        - "model serving"
        - "inference API"
        - "OpenCV"
        - "image analysis"
        - "image processing"
        - "blueprint"
        - "floor plan"
        - "CAD"
        - "document analysis"
        - "OCR"
        - "object detection"
        - "segmentation"
        - "contour"
        - "edge detection"
        - "spatial analysis"
        - "graph analysis"
        - "feature extraction"
        - "pattern recognition"
        - "wall detection"
        - "room detection"
      frameworks:
        - "tensorflow"
        - "pytorch"
        - "keras"
        - "scikit-learn"
        - "huggingface"
        - "openai"
        - "fastapi"
        - "opencv"
        - "pillow"
        - "scikit-image"
      technologies:
        - "python"
        - "jupyter"
        - "pandas"
        - "numpy"
        - "cuda"
        - "gpu"
        - "async"
        - "pydantic"
        - "networkx"
        - "matplotlib"
        - "plotly"
    auto_experts: ["pm", "systemdev", "research", "backend", "frontend", "qa", "mcp"]
    memory_template: "ai-system"
    workflow_priority: ["requirements_analysis", "research_analysis", "architecture_design", "system_development", "backend_implementation", "frontend_implementation", "integration_orchestration", "deployment_pipeline", "quality_assurance"]
    
  mobile_application:
    name: "Mobile Application"
    triggers:
      keywords: ["mobile", "app", "React Native", "Flutter", "iOS", "Android", "native", "hybrid"]
      frameworks: ["react-native", "flutter", "ionic", "xamarin", "cordova"]
      technologies: ["swift", "kotlin", "java", "dart", "objective-c"]
    auto_experts: ["pm", "frontend", "backend", "devops", "qa", "mcp"]
    memory_template: "mobile-app"
    workflow_priority: ["requirements_analysis", "architecture_design", "frontend_implementation", "backend_implementation", "integration_orchestration", "deployment_pipeline", "quality_assurance"]
    
  data_processing_system:
    name: "Data Processing System"
    triggers:
      keywords: ["data pipeline", "ETL", "data warehouse", "big data", "streaming", "batch processing", "data migration", "data API"]
      frameworks: ["apache-spark", "kafka", "airflow", "pandas", "dask", "fastapi"]
      technologies: ["python", "scala", "sql", "nosql", "hadoop", "elasticsearch", "async", "pydantic"]
    auto_experts: ["pm", "systemdev", "backend", "research", "devops", "mcp"]
    memory_template: "data-system"
    workflow_priority: ["requirements_analysis", "research_analysis", "architecture_design", "system_development", "backend_implementation", "integration_orchestration", "deployment_pipeline", "quality_assurance"]
    
  api_microservice:
    name: "API/Microservice"
    triggers:
      keywords: ["API", "microservice", "REST", "GraphQL", "service separation", "backend service", "web service", "async API", "Python API", "FastAPI"]
      frameworks: ["nestjs", "express", "fastapi", "django", "flask", "spring"]
      technologies: ["nodejs", "python", "java", "golang", "docker", "kubernetes", "async", "pydantic", "sqlalchemy"]
    auto_experts: ["pm", "backend", "fullstack", "devops", "qa", "mcp"]
    memory_template: "api-service"
    workflow_priority: ["requirements_analysis", "architecture_design", "backend_implementation", "deployment_pipeline", "quality_assurance"]
    
  desktop_application:
    name: "Desktop Application"
    triggers:
      keywords: ["desktop", "GUI", "Windows app", "Mac app", "cross platform", "native app"]
      frameworks: ["electron", "tauri", "flutter-desktop", "qt", "tkinter", "wpf"]
      technologies: ["javascript", "rust", "python", "c++", "c#", "dart"]
    auto_experts: ["pm", "frontend", "systemdev", "devops", "qa", "mcp"]
    memory_template: "desktop-app"
    workflow_priority: ["requirements_analysis", "architecture_design", "frontend_implementation", "system_development", "deployment_pipeline", "quality_assurance"]

# Automatic Detection Algorithm Configuration
detection_algorithm:
  scoring_weights:
    keywords: 40    # Keyword matching weight
    frameworks: 35  # Framework matching weight
    technologies: 25 # Technology stack matching weight
  
  minimum_score: 30 # Minimum matching score (out of 100)
  fallback_type: "web_application" # Default type when detection fails
  
  multi_type_detection: true # Handle multiple type detection
  hybrid_handling: "primary_secondary" # Hybrid project handling approach

# Expert Assignment Rules
expert_assignment_rules:
  always_include: ["pm", "mcp"] # Always required for all projects
  conditional_include:
    research: ["ai_ml_system", "data_processing_system"] # Projects where research is important
    systemdev: ["ai_ml_system", "data_processing_system", "desktop_application"] # Projects requiring system development
    devops: ["web_application", "mobile_application", "api_microservice"] # Projects where deployment is important
  
  collaboration_matrix:
    frontend: ["backend", "fullstack", "qa"]
    backend: ["frontend", "fullstack", "devops", "qa"]  
    fullstack: ["frontend", "backend", "systemdev", "devops"]
    systemdev: ["backend", "fullstack", "research"]
    devops: ["backend", "fullstack", "systemdev"]
    qa: ["frontend", "backend", "fullstack", "mcp"]
    research: ["systemdev", "backend", "pm"]
    mcp: ["all"] # Can collaborate with all experts

# User Request Analysis Patterns
request_analysis_patterns:
  # Direct project type mentions
  explicit_patterns:
    - "(.+) web app(.+) create(.+)"
    - "(.+) mobile app(.+) develop(.+)"
    - "(.+) AI (.+) system(.+)"
    - "(.+) API(.+) build(.+)"
    - "(.+) data(.+) pipeline(.+)"
  
  # Technology stack based inference
  # Format: "pattern -> project_type"
  tech_stack_patterns:
    - "Next.js(.+) -> web_application"
    - "React Native(.+) -> mobile_application"
    - "TensorFlow(.+) -> ai_ml_system"
    - "FastAPI(.+) -> api_microservice"
    - "Electron(.+) -> desktop_application"
    - "OpenCV(.+) -> ai_ml_system"
    - "scikit-image(.+) -> ai_ml_system"
  
  # Feature based inference
  # Format: "pattern -> project_type"
  feature_patterns:
    - "(.+)login(.+)registration(.+) -> web_application"
    - "(.+)prediction(.+)analysis(.+) -> ai_ml_system"
    - "(.+)real-time(.+)chat(.+) -> web_application"
    - "(.+)data(.+)collection(.+)processing(.+) -> data_processing_system"
    - "(.+)image(.+)analysis(.+) -> ai_ml_system"
    - "(.+)floor(.+)plan(.+) -> ai_ml_system"
    - "(.+)blueprint(.+)detection(.+) -> ai_ml_system"
    - "(.+)wall(.+)detection(.+) -> ai_ml_system"
    - "(.+)spatial(.+)graph(.+) -> ai_ml_system"

# Development AI Agent Team Pattern Application
novel_analysis_integration:
  automatic_expert_activation: true # Automatic expert activation
  user_input_simplification: true # User input simplification
  intelligent_workflow_adaptation: true # Intelligent workflow adaptation

  activation_protocol:
    - "User request analysis"
    - "Automatic project type detection"
    - "Automatic expert team composition"
    - "Domain-specific memory template application"
    - "Automatic workflow initiation"

  user_experience_enhancement:
    - "Eliminate complex expert selection process"
    - "Project-optimized team composition"
    - "Provide immediately actionable workflows"
    - "Domain-specialized context management"

# Existing Project Detection and Enhancement
existing_project_enhancement:
  detection_triggers:
    existing_project_indicators:
      - "workspace/ folder contains project files"
      - "package.json or similar project files found"
      - "src/ or app/ directories exist"
      - "README.md with project description"
      - "git repository detected"

  enhancement_workflow:
    phase_1: "existing_project_analysis"
    phase_2: "progressive_enhancement"

  zero_confirmation_policy:
    automatic_backup: true # Never ask user for backup confirmation
    automatic_enhancement: true # Never ask user for enhancement confirmation
    automatic_deployment: true # Never ask user for deployment confirmation
    risk_management: "automatic" # Handle all risks automatically

  safety_protocols:
    mandatory_backup: true # Always create backup before any changes
    hot_swap_validation: true # Always validate changes before applying
    rollback_readiness: true # Always prepare rollback mechanisms
    continuous_testing: true # Continuously test during enhancement